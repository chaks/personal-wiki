# Wiki Schema Configuration
# Defines wiki structure, categories, and LLM workflows

services:
  llm:
    model: "gemma4:e2b"
    embedding_model: "nomic-embed-text"
  vector_store:
    url: "http://localhost:6333"
    collection: "personal_wiki"

wiki:
  # Categories for organizing wiki pages
  categories:
    - entities      # Concrete things: people, organizations, products
    - concepts      # Abstract ideas: theories, patterns, methodologies
    - events        # Conferences, releases, milestones
    - documents     # Source document summaries

  # Frontmatter fields for all pages
  frontmatter:
    required:
      - title
      - category
    optional:
      - created_at
      - updated_at
      - links
      - source_refs

  # Link format: [[wikilink]] syntax
  link_format: "[[{name}]]"

  # Page template structure
  template: |
    ---
    title: {title}
    category: {category}
    created_at: {created_at}
    ---

    # {title}

    {content}

    ## See Also

    - [[related_link_1]]
    - [[related_link_2]]

ingestion:
  # Workflow for processing sources
  output_dir: "generated"
  enable_entity_extraction: true
  enable_concept_extraction: true

  workflow:
    - compute_hash
    - check_registry
    - convert_with_docling
    - extract_entities_concepts
    - create_or_update_pages
    - embed_and_index
    - update_registry

  # LLM prompts for extraction
  prompts:
    extract_entities: |
      Extract key entities from this document. Rules:
      - Output ONLY lines starting with "ENTITY:" — no other text whatsoever
      - Each entity on its own line
      - Use the exact format: ENTITY: <name> | <type> | <description>
      - Types: person, organization, product, technology, framework, protocol, pattern, methodology, book, company

      Example output:
      ENTITY: REST | technology | Architectural style for distributed hypermedia systems
      ENTITY: HATEOAS | pattern | Hypermedia constraint enabling client discovery of available actions
      ENTITY: Fielding | person | Dissertation author who formalized REST architectural style

      Document:
      {document}

    extract_concepts: |
      Extract key concepts from this document. Rules:
      - Output ONLY lines starting with "CONCEPT:" — no other text whatsoever
      - Each concept on its own line
      - Use the exact format: CONCEPT: <name> | <definition> | <related_entities>
      - Keep definitions to one short sentence
      - List comma-separated related entity names (or "N/A")

      Example output:
      CONCEPT: Resource-oriented design | API design approach focusing on nouns/resources rather than verbs/actions | REST, HTTP
      CONCEPT: Hypermedia as the engine of application state | Client navigates an API through links embedded in responses | HATEOAS, REST

      Document:
      {document}

    resolve_links: |
      Given the following wiki page content, identify potential links to existing
      pages. Return a list of page titles that should be linked.

      Content:
      {content}

      Existing pages: {existing_pages}

maintenance:
  # Periodic health checks
  lint:
    - check_orphans         # Pages with no incoming links
    - check_contradictions  # Conflicting claims across pages
    - check_stale_claims    # Outdated information
    - validate_links        # Broken or circular links
    - detect_duplicates     # Similar content across pages

  # Schedule (cron format)
  schedule: "0 3 * * *"  # Daily at 3 AM
